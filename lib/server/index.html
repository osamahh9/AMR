<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AMR Navigator Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a4e6ff",
                        "background": "#131313",
                        "primary-container": "#00d1ff",
                        "on-primary-container": "#003543",
                        "secondary-container": "#34ff8d",
                        "on-secondary-container": "#003919",
                        "error": "#ffb4ab",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "surface": "#131313",
                        "on-surface": "#e5e2e1",
                        "surface-container": "#201f1f",
                        "on-surface-variant": "#bbc9cf"
                    },
                    fontFamily: {
                        "mono-data": ["JetBrains Mono"],
                        "label-caps": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 209, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 209, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100dvh;
        }
        .glass-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 209, 255, 0.2);
        }
        .neon-glow {
            box-shadow: 0 0 12px rgba(0, 209, 255, 0.4);
        }
        .neon-text-glow {
            text-shadow: 0 0 8px rgba(0, 209, 255, 0.6);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #a4e6ff;
            box-shadow: 0 0 10px rgba(0, 209, 255, 0.8);
            cursor: pointer;
            margin-top: -8px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(0, 209, 255, 0.2);
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col pb-[100px] pt-[80px]">
    <header class="bg-surface/80 backdrop-blur-md text-primary fixed top-0 w-full border-b border-primary/20 shadow-[0_0_12px_rgba(0,209,255,0.4)] flex justify-between items-center px-4 h-16 z-50">
        <span class="material-symbols-outlined p-2">precision_manufacturing</span>
        <h1 class="font-mono-data text-xl text-primary tracking-tighter uppercase neon-text-glow">AMR_NAVIGATOR_S3</h1>
        <span class="material-symbols-outlined p-2">sensors</span>
    </header>

    <main class="flex-1 px-4 flex flex-col gap-4 max-w-lg mx-auto w-full">
        <!-- TELEMETRY -->
        <section class="glass-card rounded-xl p-4 flex flex-col gap-4">
            <h2 class="font-label-caps text-xs text-primary tracking-widest border-b border-primary/20 pb-2 uppercase">Telemetry</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col">
                    <span class="text-xs text-on-surface-variant">Position (X,Y)</span>
                    <span class="font-mono-data text-primary text-lg neon-text-glow" id="pos">0, 0</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-xs text-on-surface-variant">Heading</span>
                    <span class="font-mono-data text-primary text-lg neon-text-glow" id="heading">0.0°</span>
                </div>
            </div>
        </section>

        <!-- OBSTACLE MONITOR -->
        <section class="glass-card rounded-xl p-4 flex flex-col gap-4">
            <div class="flex justify-between items-center border-b border-primary/20 pb-2">
                <h2 class="font-label-caps text-xs text-primary tracking-widest uppercase">Obstacle</h2>
                <div class="px-2 py-1 rounded bg-secondary-container text-on-secondary-container font-label-caps text-[10px] animate-pulse" id="obs">PATH CLEAR</div>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-xs text-on-surface-variant">Distance:</span>
                <span class="font-mono-data text-primary text-2xl neon-text-glow" id="dist">-- cm</span>
            </div>
        </section>

        <!-- NAVIGATION CONTROL -->
        <section class="glass-card rounded-xl p-4 flex flex-col gap-4">
            <h2 class="font-label-caps text-xs text-primary tracking-widest border-b border-primary/20 pb-2 uppercase">Navigation</h2>
            <div class="grid grid-cols-3 gap-2">
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-on-surface-variant uppercase" for="tx">X (mm)</label>
                    <input class="bg-surface-container text-primary font-mono-data border border-primary/20 rounded p-2 outline-none text-center" id="tx" type="number" value="0"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-on-surface-variant uppercase" for="ty">Y (mm)</label>
                    <input class="bg-surface-container text-primary font-mono-data border border-primary/20 rounded p-2 outline-none text-center" id="ty" type="number" value="0"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-on-surface-variant uppercase" for="th">Angle (°)</label>
                    <input class="bg-surface-container text-primary font-mono-data border border-primary/20 rounded p-2 outline-none text-center" id="th" type="number" value="0"/>
                </div>
            </div>
            <button class="w-full bg-primary-container text-on-primary-container font-bold py-3 rounded-lg neon-glow active:scale-95 transition-transform mt-2 tracking-widest uppercase" onclick="startNav()">
                Go To Goal
            </button>
        </section>

        <!-- ACTUATORS -->
        <section class="glass-card rounded-xl p-4 flex flex-col gap-6">
            <h2 class="font-label-caps text-xs text-primary tracking-widest border-b border-primary/20 pb-2 uppercase">Actuators</h2>
            <div class="flex flex-col gap-2">
                <div class="flex justify-between">
                    <span class="text-xs text-on-surface-variant">Servo 1</span>
                    <span class="font-mono-data text-primary" id="s1v">90°</span>
                </div>
                <input class="w-full h-1 bg-primary/20 rounded-lg appearance-none cursor-pointer" id="s1" max="180" min="0" oninput="updateServo(1)" type="range" value="90"/>
            </div>
            <div class="flex flex-col gap-2">
                <div class="flex justify-between">
                    <span class="text-xs text-on-surface-variant">Servo 2</span>
                    <span class="font-mono-data text-primary" id="s2v">90°</span>
                </div>
                <input class="w-full h-1 bg-primary/20 rounded-lg appearance-none cursor-pointer" id="s2" max="180" min="0" oninput="updateServo(2)" type="range" value="90"/>
            </div>
        </section>

        <!-- EMERGENCY STOP -->
        <button class="w-full bg-error-container text-error font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(147,0,10,0.4)] active:scale-95 transition-transform tracking-widest border border-error/20 uppercase" onclick="stopAll()">
            Emergency Stop
        </button>
    </main>

    <script>
        function startNav() {
            var x = document.getElementById("tx").value;
            var y = document.getElementById("ty").value;
            var th = document.getElementById("th").value;
            fetch("/nav?x=" + x + "&y=" + y + "&th=" + th);
            
            // Temporary feedback
            const btn = document.querySelector('button[onclick="startNav()"]');
            const originalText = btn.innerText;
            btn.innerText = "Transmitting...";
            setTimeout(() => { btn.innerText = originalText; }, 500);
        }

        function stopAll() {
            fetch("/drive?left=0&right=0");
            document.body.style.backgroundColor = '#410004';
            setTimeout(() => { document.body.style.backgroundColor = ''; }, 150);
        }

        function updateServo(ui_ch) {
            var val = document.getElementById("s" + ui_ch).value;
            document.getElementById("s" + ui_ch + "v").innerText = val + "°";
            // Map UI 1/2 to backend 0/1
            fetch("/servo?ch=" + (ui_ch - 1) + "&angle=" + val);
        }

        function fetchStatus() {
            fetch("/status").then(function(res) {
                return res.json();
            }).then(function(data) {
                document.getElementById("pos").innerText = data.x.toFixed(0) + ", " + data.y.toFixed(0);
                document.getElementById("heading").innerText = (data.th * 180 / Math.PI).toFixed(1) + "°";
                
                var distEl = document.getElementById("dist");
                var obsEl = document.getElementById("obs");
                distEl.innerText = data.dist + " cm";
                
                if (data.obs) { 
                    obsEl.innerText = "OBSTACLE!"; 
                    obsEl.classList.replace('bg-secondary-container', 'bg-error-container');
                    obsEl.classList.replace('text-on-secondary-container', 'text-on-error-container');
                    distEl.classList.add('text-error');
                    distEl.classList.remove('text-primary');
                } else { 
                    obsEl.innerText = "PATH CLEAR"; 
                    obsEl.classList.replace('bg-error-container', 'bg-secondary-container');
                    obsEl.classList.replace('text-on-error-container', 'text-on-secondary-container');
                    distEl.classList.remove('text-error');
                    distEl.classList.add('text-primary');
                }
            }).catch(function(e) {});
        }

        setInterval(fetchStatus, 100);
    </script>
</body>
</html>
