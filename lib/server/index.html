<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AMR Dashboard</title>
    <style>
        :root { 
            --bg: #0f1115; 
            --card: #1a1d24; 
            --primary: #00d1ff; 
            --danger: #ff4d4d; 
            --warning: #ffcc00;
            --success: #00ff88;
            --text: #f5f6f8; 
            --text-muted: #8a92a6;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 16px;
            min-height: 100vh;
        }

        h1 { 
            font-size: 1.5rem; 
            letter-spacing: 2px; 
            margin-bottom: 16px; 
            text-transform: uppercase; 
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 209, 255, 0.2);
        }

        /* 2-column grid layout built for mobile viewports */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            width: 100%; 
            max-width: 480px; 
        }

        .card { 
            background: var(--card); 
            padding: 14px; 
            border-radius: 14px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); 
            text-align: center; 
            border-top: 4px solid var(--primary); 
            border-left: 1px solid rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .card.danger { border-top-color: var(--danger); }
        .card.warning { border-top-color: var(--warning); }

        /* Obstacle distance spans full width */
        .grid > .card:nth-child(3) {
            grid-column: span 2;
        }

        .val { 
            font-size: 2.2rem; 
            font-weight: 700; 
            margin: 4px 0; 
            color: var(--primary); 
            font-variant-numeric: tabular-nums;
        }

        .label { 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Thumb-friendly drive control panel */
        .controls { 
            display: flex; 
            justify-content: space-around; 
            gap: 20px; 
            margin-top: 16px; 
            width: 100%;
            max-width: 480px;
            background: var(--card);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .control-group p {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 8px;
            color: var(--text-muted);
        }

        /* Uniform sizing for vertical sliders on touch displays */
        input[type=range][orient=vertical] { 
            appearance: slider-vertical; 
            width: 50px; 
            height: 160px; 
            cursor: pointer; 
            accent-color: var(--primary);
        }

        /* UI element for distance feedback */
        #distBar { 
            width: 100%; 
            height: 12px; 
            background: #2a2d35; 
            border-radius: 6px; 
            margin-top: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        #distFill { 
            height: 100%; 
            background: var(--primary); 
            width: 0%; 
            transition: width 0.2s ease, background-color 0.2s; 
        }

        /* Servo Container stacks beautifully on mobile, goes row on tablets */
        .servo-container { 
            display: flex; 
            flex-direction: column;
            gap: 12px; 
            width: 100%; 
            max-width: 480px; 
            margin-top: 12px; 
        }

        .servo-card { 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 16px;
        }

        input[type=range].horizontal { 
            width: 100%; 
            margin: 12px 0 6px 0; 
            accent-color: var(--primary);
            height: 8px;
            border-radius: 4px;
        }

        #obsIndicator { 
            font-size: 11px;
            font-weight: 800; 
            padding: 6px 16px; 
            border-radius: 20px; 
            margin-top: 8px; 
            display: inline-block; 
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* High-visibility Stop button placed perfectly for driving thumb */
        .btn { 
            background: linear-gradient(135deg, var(--danger), #d63333); 
            border: none; 
            color: white; 
            width: 100%;
            max-width: 480px;
            padding: 16px; 
            border-radius: 14px; 
            font-size: 18px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 16px; 
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.25);
            letter-spacing: 1px;
            transition: transform 0.05s, background 0.2s; 
        }

        .btn:active { 
            transform: scale(0.97); 
            background: #cc2e2e;
        }

        /* Desktop Optimization (keeps everything proportional if viewed on large displays) */
        @media (min-width: 600px) {
            .grid, .controls, .servo-container, .btn { max-width: 700px; }
            .servo-container { flex-direction: row; }
            .servo-card { flex: 1; }
        }
    </style>
</head>
<body>
    <h1>AMR Monitor</h1>

    <div class="grid">
        <div class="card">
            <div class="label">Left Motor</div>
            <div id="lRpm" class="val">0</div>
            <div class="label">RPM</div>
        </div>
        <div class="card">
            <div class="label">Right Motor</div>
            <div id="rRpm" class="val">0</div>
            <div class="label">RPM</div>
        </div>
        <div class="card danger">
            <div class="label">Obstacle Distance</div>
            <div id="distVal" class="val">--</div>
            <div class="label">Centimeters</div>
            <div id="obsIndicator">PATH CLEAR</div>
            <div id="distBar"><div id="distFill"></div></div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <input type="range" id="leftSlider" min="-600" max="600" value="0" step="10" orient="vertical">
            <p>LEFT</p>
        </div>
        <div class="control-group">
            <input type="range" id="rightSlider" min="-600" max="600" value="0" step="10" orient="vertical">
            <p>RIGHT</p>
        </div>
    </div>

    <div class="servo-container">
        <div class="card servo-card">
            <div class="label">Servo 1</div>
            <input type="range" id="servo1" min="0" max="180" value="90" class="horizontal">
            <div id="servo1Val" class="val" style="font-size: 20px; margin: 0;">90°</div>
        </div>
        <div class="card servo-card">
            <div class="label">Servo 2</div>
            <input type="range" id="servo2" min="0" max="180" value="90" class="horizontal">
            <div id="servo2Val" class="val" style="font-size: 20px; margin: 0;">90°</div>
        </div>
    </div>

    <button id="stopBtn" class="btn">STOP ALL</button>

    <script>
        const leftSlider = document.getElementById('leftSlider');
        const rightSlider = document.getElementById('rightSlider');
        const s1Slider = document.getElementById('servo1');
        const s2Slider = document.getElementById('servo2');
        const s1Text = document.getElementById('servo1Val');
        const s2Text = document.getElementById('servo2Val');
        const lRpmText = document.getElementById('lRpm');
        const rRpmText = document.getElementById('rRpm');
        const distText = document.getElementById('distVal');
        const distFill = document.getElementById('distFill');
        const obsIndicator = document.getElementById('obsIndicator');

        async function updateDrive() {
            fetch("/drive?left=" + leftSlider.value + "&right=" + rightSlider.value);
        }

        async function updateServo(ch) {
            const val = ch === 0 ? s1Slider.value : s2Slider.value;
            if (ch === 0) s1Text.innerText = val + "°";
            else s2Text.innerText = val + "°";
            fetch("/servo?ch=" + ch + "&angle=" + val);
        }

        async function fetchStatus() {
            try {
                const res = await fetch("/status");
                const data = await res.json();
                lRpmText.innerText = data.left.toFixed(1);
                rRpmText.innerText = data.right.toFixed(1);

                if (data.obs) {
                    obsIndicator.innerText = "OBSTACLE DETECTED";
                    obsIndicator.style.background = "#ff4d4d";
                    obsIndicator.style.color = "white";
                } else {
                    obsIndicator.innerText = "PATH CLEAR";
                    obsIndicator.style.background = "#00ff88";
                    obsIndicator.style.color = "black";
                }

                if (data.dist > 400) {
                    distText.innerText = "CLEAR";
                    distFill.style.width = "100%";
                    distFill.style.background = "#00ff88";
                } else {
                    distText.innerText = data.dist;
                    let p = (data.dist / 100) * 100;
                    if (p > 100) p = 100;
                    distFill.style.width = p + "%";
                    distFill.style.background = data.dist < 20 ? "#ff4d4d" : "#00d1ff";
                }
            } catch (e) {}
        }

        leftSlider.oninput = updateDrive;
        rightSlider.oninput = updateDrive;
        s1Slider.oninput = function() { updateServo(0); };
        s2Slider.oninput = function() { updateServo(1); };

        const reset = function() { 
            leftSlider.value = 0; 
            rightSlider.value = 0; 
            updateDrive(); 
        };
        leftSlider.onmouseup = leftSlider.ontouchend = function() { leftSlider.value = 0; updateDrive(); };
        rightSlider.onmouseup = rightSlider.ontouchend = function() { rightSlider.value = 0; updateDrive(); };
        document.getElementById('stopBtn').onclick = reset;

        setInterval(fetchStatus, 200);
    </script>
</body>
</html>
